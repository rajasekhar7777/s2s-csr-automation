---
ansible_connection: ansible.netcommon.network_cli
ansible_network_os: cisco.ios.ios
ansible_become: true
ansible_become_method: enable

# Credentials are injected by AWX credential / ADO variable group — never hard-code.
# ansible_user / ansible_password / ansible_become_password come from there.

# Defaults; per-host files override.
eff_wan_interface_default: GigabitEthernet1
