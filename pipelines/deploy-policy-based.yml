trigger: none

parameters:
  - name: target_host
    type: string
    default: csr_routers
  - name: crypto_map_id
    type: number
  - name: crypto_map_desc
    type: string
  - name: remote_peer_ip
    type: string

variables:
  - group: csr-credentials

pool:
  name: production-network-agents

steps:
  - checkout: self

  - script: |
      pip install "ansible-core>=2.15"
      ansible-galaxy collection install -r requirements.yml
    displayName: Install Ansible + collections

  - script: |
      ansible-playbook \
        -i inventory/hosts.yml \
        -l ${{ parameters.target_host }} \
        -e "crypto_map_id=${{ parameters.crypto_map_id }}" \
        -e "crypto_map_desc=${{ parameters.crypto_map_desc }}" \
        -e "remote_peer_ip=${{ parameters.remote_peer_ip }}" \
        -e "vpn_psk=$(VPN_PSK)" \
        -e "@vars/acl_lines.json" \
        -e "ansible_user=$(ansible_user)" \
        -e "ansible_password=$(ansible_password)" \
        -e "ansible_become_password=$(ansible_become_password)" \
        playbooks/deploy_policy_vpn.yml
    displayName: Deploy policy-based VPN
