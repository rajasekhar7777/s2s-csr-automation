trigger: none

parameters:
  - name: target_host
    type: string
    default: csr_routers
  - name: tunnel_id
    type: number
  - name: confirm_tunnel_id
    type: number
  - name: tunnel_desc
    type: string
  - name: remote_peer_ip
    type: string
  - name: routing_type
    type: string
    default: static
    values: [static, dynamic]

variables:
  - group: csr-credentials

pool:
  name: production-network-agents

steps:
  - checkout: self

  - script: |
      pip install "ansible-core>=2.15"
      ansible-galaxy collection install -r requirements.yml
    displayName: Install Ansible + collections

  - script: |
      ansible-playbook \
        -i inventory/hosts.yml \
        -l ${{ parameters.target_host }} \
        -e "tunnel_id=${{ parameters.tunnel_id }}" \
        -e "confirm_tunnel_id=${{ parameters.confirm_tunnel_id }}" \
        -e "tunnel_desc=${{ parameters.tunnel_desc }}" \
        -e "remote_peer_ip=${{ parameters.remote_peer_ip }}" \
        -e "routing_type=${{ parameters.routing_type }}" \
        -e "ansible_user=$(ansible_user)" \
        -e "ansible_password=$(ansible_password)" \
        -e "ansible_become_password=$(ansible_become_password)" \
        playbooks/remove_csr.yml
    displayName: Remove route-based VPN
