---
- name: Deploy IKEv2 route-based VPN tunnel on Cisco CSR
  hosts: "{{ target_host | default('csr_routers') }}"
  gather_facts: false

  pre_tasks:

    # ---------- Normalize inputs into eff_* facts (extra-vars-safe) ----------
    - name: Normalize critical inputs into eff_* facts
      ansible.builtin.set_fact:
        eff_tunnel_desc:                 "{{ tunnel_desc                 | default('',         true) | trim }}"
        eff_routing_type:                "{{ routing_type                | default('dynamic',  true) | trim | lower }}"
        eff_keyring_name:                "{{ keyring_name                | default('',         true) | trim }}"
        eff_profile_name:                "{{ profile_name                | default('',         true) | trim }}"
        eff_ipsec_profile_name:          "{{ ipsec_profile_name          | default('',         true) | trim }}"
        eff_acl_name:                    "{{ acl_name                    | default('',         true) | trim }}"
        eff_csr_pl_name:                 "{{ csr_pl_name                 | default('CSR_LIST', true) | trim }}"
        eff_ikev2_lifetime:              "{{ ikev2_lifetime              | default(28800,      true) }}"
        eff_local_asn:                   "{{ local_asn                   | default(398957,     true) }}"
        eff_match_identity_remote_type:  "{{ match_identity_remote_type  | default('address',  true) | trim | lower }}"
        eff_match_identity_remote_value: "{{ match_identity_remote_value | default('',         true) | trim }}"
        eff_identity_local_type:         "{{ identity_local_type         | default('',         true) | trim | lower }}"
        eff_identity_local_value:        "{{ identity_local_value        | default('',         true) | trim }}"
        eff_wan_interface:               "{{ wan_interface               | default('GigabitEthernet1', true) | trim }}"
        eff_wan_gateway:                 "{{ wan_gateway                 | default('10.138.1.1',       true) | trim }}"
        # ---- crypto + tunnel-iface tunables ----
        eff_transform_set: >-
          {{ ((transform_set[0] if (transform_set is iterable and transform_set is not string and (transform_set | length) > 0)
               else (transform_set | default('AES256-SHA256', true)))
              | string | trim | upper)
             | regex_replace('[\\s_]+', '-')
             | regex_replace('^AES-?256-?SHA-?256$', 'AES256-SHA256')
             | regex_replace('^AES-?256-?SHA-?1$',   'AES256-SHA1')
             | regex_replace('^AES-?256-?SHA$',      'AES256-SHA1') }}
        eff_pfs_group: "{{ pfs_group | default('group20', true) | string | trim | lower }}"
        eff_ip_mtu:    "{{ ip_mtu    | default(1400,      true) | int }}"
        # raw user-supplied tcp_mss (clamped in next step)
        _raw_tcp_mss:  "{{ tcp_mss   | default(1360,      true) | int }}"

    # ---------- Auto-clamp tcp_mss to (ip_mtu - 40) ----------
    - name: Compute eff_tcp_mss (auto-clamped to ip_mtu - 40)
      ansible.builtin.set_fact:
        eff_tcp_mss: "{{ [(_raw_tcp_mss | int), ((eff_ip_mtu | int) - 40)] | min }}"

    - name: Warn if tcp_mss was clamped
      when: (_raw_tcp_mss | int) > ((eff_ip_mtu | int) - 40)
      ansible.builtin.debug:
        msg: >-
          NOTICE: tcp_mss={{ _raw_tcp_mss }} exceeded (ip_mtu - 40)={{ (eff_ip_mtu | int) - 40 }};
          auto-clamped to {{ eff_tcp_mss }}.

    # ---------- Validation ----------
    - name: Validate routing_type
      ansible.builtin.assert:
        that:
          - eff_routing_type in ['dynamic', 'static']
        fail_msg: "routing_type must be 'dynamic' or 'static'"

    - name: Validate required identifiers
      ansible.builtin.assert:
        that:
          - tunnel_id       is defined and (tunnel_id | int) > 0
          - (eff_tunnel_desc | length) > 0
          - tunnel_local_ip is defined and (tunnel_local_ip | length) > 0
          - remote_peer_ip  is defined and (remote_peer_ip  | length) > 0
          - vpn_psk         is defined and (vpn_psk         | length) > 0
        fail_msg: "tunnel_id, tunnel_desc, tunnel_local_ip, remote_peer_ip, vpn_psk are required"

    - name: Validate match_identity_remote_type
      ansible.builtin.assert:
        that:
          - eff_match_identity_remote_type in ['address', 'fqdn']
        fail_msg: "match_identity_remote_type must be 'address' or 'fqdn'"

    - name: Validate identity_local_type (optional)
      ansible.builtin.assert:
        that:
          - (eff_identity_local_type | length) == 0
            or eff_identity_local_type in ['address', 'fqdn']
        fail_msg: "identity_local_type must be 'address' or 'fqdn' (or blank)"

    - name: Validate identity_local_value when type is set
      ansible.builtin.assert:
        that:
          - (eff_identity_local_type | length) == 0
            or (eff_identity_local_value | length) > 0
        fail_msg: "identity_local_value required when identity_local_type is set"

    - name: Validate BGP fields when routing_type=dynamic
      when: eff_routing_type == 'dynamic'
      ansible.builtin.assert:
        that:
          - bgp_neighbor_ip is defined and (bgp_neighbor_ip | length) > 0
          - remote_asn      is defined and (remote_asn | int) > 0
        fail_msg: "routing_type=dynamic requires bgp_neighbor_ip and remote_asn"

    - name: Validate local_networks when routing_type=static
      when: eff_routing_type == 'static'
      ansible.builtin.assert:
        that:
          - local_networks is defined and (local_networks | length) > 0
        fail_msg: "routing_type=static requires local_networks (one 'NETWORK MASK' or CIDR per line)"

    # ---- Validate transform_set / pfs_group / mtu / mss ----
    - name: Debug — raw vs normalized tunables
      ansible.builtin.debug:
        msg:
          raw_transform_set: "{{ transform_set | default('<undef>') }}"
          eff_transform_set: "{{ eff_transform_set }}"
          raw_pfs_group:     "{{ pfs_group     | default('<undef>') }}"
          eff_pfs_group:     "{{ eff_pfs_group }}"
          raw_ip_mtu:        "{{ ip_mtu        | default('<undef>') }}"
          eff_ip_mtu:        "{{ eff_ip_mtu }}"
          raw_tcp_mss:       "{{ tcp_mss       | default('<undef>') }}"
          eff_tcp_mss:       "{{ eff_tcp_mss }}"

    - name: Validate transform_set
      ansible.builtin.assert:
        that:
          - eff_transform_set in ['AES256-SHA256', 'AES256-SHA1']
        fail_msg: "transform_set must be 'AES256-SHA256' or 'AES256-SHA1' (got: '{{ eff_transform_set }}', raw: '{{ transform_set | default('<undef>') }}')"

    - name: Validate pfs_group
      ansible.builtin.assert:
        that:
          - (eff_pfs_group | length) > 0
          - eff_pfs_group is match('^group([0-9]+)$')
        fail_msg: "pfs_group must look like 'groupN' (e.g. group14, group19, group20, group24); got: '{{ eff_pfs_group }}'"

    - name: Validate ip_mtu range
      ansible.builtin.assert:
        that:
          - (eff_ip_mtu | int) >= 576
          - (eff_ip_mtu | int) <= 9216
        fail_msg: "ip_mtu must be between 576 and 9216 (got: {{ eff_ip_mtu }})"

    - name: Validate tcp_mss lower bound
      ansible.builtin.assert:
        that:
          - (eff_tcp_mss | int) >= 536
        fail_msg: "tcp_mss must be >= 536 (got: {{ eff_tcp_mss }})"

    # ---------- csr_pl_lege handling ----------
    - name: Validate csr_pl_lege format — blank OR 'le N' (N=0..32)
      ansible.builtin.assert:
        that:
          - >
            (csr_pl_lege is not defined)
            or ((csr_pl_lege | trim | length) == 0)
            or ((csr_pl_lege | trim) is match('^le\s+([0-9]|[12][0-9]|3[0-2])$'))
        fail_msg: "'csr_pl_lege' must be blank OR exactly 'le N' where N is 0..32."

    - name: Extract numeric N from csr_pl_lege (-1 if blank)
      ansible.builtin.set_fact:
        pl_le_value: >-
          {{ (csr_pl_lege | trim | regex_replace('^le\s+', '') | int)
             if (csr_pl_lege is defined and (csr_pl_lege | trim | length) > 0)
             else -1 }}

    - name: Compute /M (bits) for each entry in local_networks (static mode)
      when: eff_routing_type == 'static'
      ansible.builtin.set_fact:
        pl_mask_bits: >-
          {%- set octet = {'0':0,'128':1,'192':2,'224':3,'240':4,'248':5,'252':6,'254':7,'255':8} -%}
          {%- set out = [] -%}
          {%- for line in (local_networks | default('')).splitlines() -%}
            {%- set p = line.split() -%}
            {%- if (p | length) >= 2 -%}
              {%- set bits = 0 -%}
              {%- for o in p[1].split('.') -%}{%- set bits = bits + octet.get(o, 0) -%}{%- endfor -%}
              {%- set _ = out.append(bits) -%}
            {%- elif (p | length) == 1 and '/' in p[0] -%}
              {%- set _ = out.append(p[0].split('/')[1] | int) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ out }}

    - name: Enforce 'le N' >= /M for every local_network (static mode)
      when:
        - eff_routing_type == 'static'
        - (pl_le_value | int) >= 0
      ansible.builtin.assert:
        that:
          - (pl_le_value | int) >= (item | int)
        fail_msg: "csr_pl_lege 'le {{ pl_le_value }}' must be >= every /M. Offending /M = /{{ item }}."
      loop: "{{ pl_mask_bits | default([]) }}"

    # ---------- Derived names ----------
    - name: Derive safe_desc (sanitize tunnel_desc)
      ansible.builtin.set_fact:
        safe_desc: "{{ eff_tunnel_desc | regex_replace('\\s+', '_') | regex_replace('[^A-Za-z0-9_]', '_') }}"

    - name: Sanitize user-supplied object names
      ansible.builtin.set_fact:
        eff_keyring_name:       "{{ eff_keyring_name       | regex_replace('[^A-Za-z0-9_]', '_') }}"
        eff_profile_name:       "{{ eff_profile_name       | regex_replace('[^A-Za-z0-9_]', '_') }}"
        eff_ipsec_profile_name: "{{ eff_ipsec_profile_name | regex_replace('[^A-Za-z0-9_]', '_') }}"
        eff_acl_name:           "{{ eff_acl_name           | regex_replace('[^A-Za-z0-9_]', '_') }}"

    - name: Compute fallback names if blank
      ansible.builtin.set_fact:
        effective_keyring_name:       "{{ eff_keyring_name       if (eff_keyring_name       | length) > 0 else ('KEYRING_'    ~ safe_desc ~ '_T' ~ tunnel_id) }}"
        effective_profile_name:       "{{ eff_profile_name       if (eff_profile_name       | length) > 0 else ('PROF_'       ~ safe_desc ~ '_T' ~ tunnel_id) }}"
        effective_ipsec_profile_name: "{{ eff_ipsec_profile_name if (eff_ipsec_profile_name | length) > 0 else ('IPSEC_PROF_T' ~ tunnel_id) }}"
        effective_acl_name:           "{{ eff_acl_name           if (eff_acl_name           | length) > 0 else safe_desc }}"

    # ---------- Derived peer/SLA targets ----------
    - name: Compute peer tunnel host (auto-flip last octet within /30)
      ansible.builtin.set_fact:
        tunnel_peer_ip: >-
          {%- set parts = tunnel_local_ip.split('.') -%}
          {%- set last  = parts[-1] | int -%}
          {%- set off   = 1 if (last % 4) == 1 else -1 -%}
          {{ parts[0:3] | join('.') }}.{{ last + off }}

    - name: Decide effective IP-SLA target
      ansible.builtin.set_fact:
        effective_sla_target: "{{ sla_target_ip if (sla_target_ip is defined and (sla_target_ip | length) > 0) else tunnel_peer_ip }}"

    # ---------- CSR_LIST seq auto-discovery ----------
    - name: Read current prefix-list state
      cisco.ios.ios_command:
        commands: "show ip prefix-list {{ eff_csr_pl_name }}"
      register: pl_show
      failed_when: false

    - name: Parse existing seq numbers
      ansible.builtin.set_fact:
        pl_existing_seqs: >-
          {{ (pl_show.stdout[0] | default('') | regex_findall('seq\s+(\d+)')) | map('int') | list }}

    - name: Compute starting next seq
      ansible.builtin.set_fact:
        pl_next_seq: "{{ ((pl_existing_seqs + [0]) | max | int) + 5 }}"

    - name: Show derived facts
      ansible.builtin.debug:
        msg:
          host:                        "{{ inventory_hostname }}"
          wan_interface:               "{{ eff_wan_interface }}"
          wan_gateway:                 "{{ eff_wan_gateway }}"
          tunnel_id:                   "{{ tunnel_id }}"
          tunnel_desc:                 "{{ eff_tunnel_desc }}"
          safe_desc:                   "{{ safe_desc }}"
          routing_type:                "{{ eff_routing_type }}"
          tunnel_peer_ip:              "{{ tunnel_peer_ip }}"
          effective_sla_target:        "{{ effective_sla_target }}"
          keyring_name:                "{{ effective_keyring_name }}"
          profile_name:                "{{ effective_profile_name }}"
          ipsec_profile_name:          "{{ effective_ipsec_profile_name }}"
          acl_name:                    "{{ effective_acl_name }}"
          ikev2_lifetime:              "{{ eff_ikev2_lifetime }}"
          local_asn:                   "{{ eff_local_asn }}"
          csr_pl_name:                 "{{ eff_csr_pl_name }}"
          pl_existing_seqs:            "{{ pl_existing_seqs }}"
          pl_next_seq:                 "{{ pl_next_seq }}"
          pl_le_value:                 "{{ pl_le_value }}"
          match_identity_remote_type:  "{{ eff_match_identity_remote_type }}"
          match_identity_remote_value: "{{ eff_match_identity_remote_value }}"
          identity_local_type:         "{{ eff_identity_local_type }}"
          identity_local_value:        "{{ eff_identity_local_value }}"
          transform_set:               "{{ eff_transform_set }}"
          pfs_group:                   "{{ eff_pfs_group }}"
          ip_mtu:                      "{{ eff_ip_mtu }}"
          tcp_mss:                     "{{ eff_tcp_mss }}"

  tasks:
    - name: Push generated config
      cisco.ios.ios_config:
        src: "../templates/IKEV2_route_based_vpn.j2"
      register: cfg
      vars:
        routing_type: "{{ eff_routing_type }}"

    - name: Save startup-config
      when: cfg.changed
      cisco.ios.ios_command:
        commands: write memory

    - name: Show pushed lines
      when: cfg.changed
      ansible.builtin.debug:
        var: cfg.commands

  post_tasks:
    - name: Verify — tunnel interface
      cisco.ios.ios_command:
        commands: "show running-config interface Tunnel{{ tunnel_id }}"
      register: vfy_tun
      changed_when: false

    - name: Verify — IKEv2 profile
      cisco.ios.ios_command:
        commands: "show running-config | section crypto ikev2 profile {{ effective_profile_name }}"
      register: vfy_prof
      changed_when: false

    - name: Verify — IPsec profile
      cisco.ios.ios_command:
        commands: "show running-config | section crypto ipsec profile {{ effective_ipsec_profile_name }}"
      register: vfy_ipsec
      changed_when: false

    - name: Verify — BGP section
      cisco.ios.ios_command:
        commands: "show running-config | section router bgp"
      register: vfy_bgp
      changed_when: false

    - name: Verify — CSR_LIST
      cisco.ios.ios_command:
        commands: "show running-config | include ip prefix-list {{ eff_csr_pl_name }} "
      register: vfy_pl
      changed_when: false

    - name: Verify — ACL
      when: acl_entries is defined and (acl_entries | length) > 0
      cisco.ios.ios_command:
        commands: "show running-config | section ip access-list extended {{ effective_acl_name }}"
      register: vfy_acl
      changed_when: false

    - name: Print verification — tunnel
      ansible.builtin.debug:
        msg: "{{ vfy_tun.stdout[0].splitlines() }}"

    - name: Print verification — IKEv2 profile
      ansible.builtin.debug:
        msg: "{{ vfy_prof.stdout[0].splitlines() }}"

    - name: Print verification — IPsec profile
      ansible.builtin.debug:
        msg: "{{ vfy_ipsec.stdout[0].splitlines() }}"

    - name: Print verification — BGP
      ansible.builtin.debug:
        msg: "{{ vfy_bgp.stdout[0].splitlines() }}"

    - name: Print verification — CSR_LIST
      ansible.builtin.debug:
        msg: "{{ vfy_pl.stdout[0].splitlines() }}"

    - name: Print verification — ACL
      when: acl_entries is defined and (acl_entries | length) > 0
      ansible.builtin.debug:
        msg: "{{ vfy_acl.stdout[0].splitlines() }}"
