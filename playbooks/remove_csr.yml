---
- name: Remove route-based IKEv2 VPN tunnel from Cisco CSR
  hosts: "{{ target_host | default('csr_routers') }}"
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    keyring_name: ""
    profile_name: ""
    ipsec_profile_name: ""
    acl_name: ""
    csr_pl_name: "CSR_LIST"
    routing_type: "static"
    remove_acl: "true"
    static_remote_networks: []
    local_asn: 65000

  tasks:

    - name: Validate inputs + confirm gate
      ansible.builtin.assert:
        that:
          - tunnel_id          is defined and (tunnel_id | int) > 0
          - remote_peer_ip     is defined and (remote_peer_ip | length) > 0
          - confirm_tunnel_id  is defined and (confirm_tunnel_id | int) == (tunnel_id | int)
        fail_msg: "tunnel_id / remote_peer_ip / confirm_tunnel_id missing or mismatched."

    - name: Normalise into eff_* facts
      ansible.builtin.set_fact:
        eff_keyring_name:        "{{ keyring_name        | default('', true) | trim }}"
        eff_profile_name:        "{{ profile_name        | default('', true) | trim }}"
        eff_ipsec_profile_name:  "{{ ipsec_profile_name  | default('', true) | trim }}"
        eff_acl_name:            "{{ acl_name            | default('', true) | trim }}"
        eff_csr_pl_name:         "{{ csr_pl_name         | default('CSR_LIST', true) | trim }}"
        eff_routing_type:        "{{ routing_type        | default('static', true) | lower | trim }}"
        eff_remove_acl:          "{{ remove_acl          | default('true', true) }}"
        eff_wan_interface:       "{{ wan_interface       | default('GigabitEthernet1', true) | trim }}"
        eff_wan_gateway:         "{{ wan_gateway         | default('10.138.1.1', true) | trim }}"

    - name: Build safe descriptor
      ansible.builtin.set_fact:
        safe_desc: "{{ (tunnel_desc | default('TUN', true)) | regex_replace('[^A-Za-z0-9_]', '_') }}"

    - name: Compute effective names
      ansible.builtin.set_fact:
        effective_keyring_name:       "{{ eff_keyring_name       if (eff_keyring_name       | length) > 0 else ('KEYRING_'    ~ safe_desc ~ '_T' ~ tunnel_id) }}"
        effective_profile_name:       "{{ eff_profile_name       if (eff_profile_name       | length) > 0 else ('PROF_'       ~ safe_desc ~ '_T' ~ tunnel_id) }}"
        effective_ipsec_profile_name: "{{ eff_ipsec_profile_name if (eff_ipsec_profile_name | length) > 0 else ('IPSEC_PROF_T' ~ tunnel_id) }}"
        effective_acl_name:           "{{ eff_acl_name           if (eff_acl_name           | length) > 0 else safe_desc }}"

    # ---------- Gate 2 + 3: tunnel exists AND destination matches ----------
    - name: Gate — read existing tunnel
      cisco.ios.ios_command:
        commands: "show running-config interface Tunnel{{ tunnel_id }}"
      register: tun_exists
      failed_when: false

    - name: Gate — assert tunnel exists & destination matches
      ansible.builtin.assert:
        that:
          - "'interface Tunnel' ~ (tunnel_id | string) in (tun_exists.stdout[0] | default(''))"
          - "'tunnel destination ' ~ remote_peer_ip in (tun_exists.stdout[0] | default(''))"
        fail_msg: "Tunnel{{ tunnel_id }} not present OR tunnel destination != {{ remote_peer_ip }} — refusing to remove."

    # ---------- Independent BGP cleanup (dynamic) ----------
    - name: Dynamic — remove BGP neighbor
      when: eff_routing_type == 'dynamic'
      cisco.ios.ios_config:
        parents: "router bgp {{ local_asn }}"
        lines:
          - "no neighbor {{ tunnel_remote_ip }}"
      failed_when: false

    - name: Dynamic — discover owned CSR_LIST seq lines
      when: eff_routing_type == 'dynamic'
      cisco.ios.ios_command:
        commands: "show running-config | include ip prefix-list {{ eff_csr_pl_name }} "
      register: owned_pl_show
      failed_when: false

    - name: Dynamic — extract this tunnel's CSR_LIST lines (full original line)
      when: eff_routing_type == 'dynamic'
      ansible.builtin.set_fact:
        owned_pl_lines: >-
          {{ (owned_pl_show.stdout[0] | default('')).split('\n')
             | select('match', '^ip prefix-list ' ~ eff_csr_pl_name ~ ' seq (' ~ tunnel_id ~ '|' ~ ((tunnel_id|int)+1) ~ '|' ~ ((tunnel_id|int)+2) ~ '|' ~ ((tunnel_id|int)+3) ~ '|' ~ ((tunnel_id|int)+4) ~ ') ')
             | list }}

    - name: Dynamic — remove owned CSR_LIST entries (full-line negation)
      when: eff_routing_type == 'dynamic' and (owned_pl_lines | default([]) | length) > 0
      cisco.ios.ios_config:
        lines: "{{ ['no ' ~ item] }}"
      loop: "{{ owned_pl_lines }}"
      failed_when: false

    # ---------- Independent static-route cleanup ----------
    - name: Static — remove tunnel static routes
      when: eff_routing_type == 'static' and (static_remote_networks | length) > 0
      cisco.ios.ios_config:
        lines:
          - "no ip route {{ item.network }} {{ item.mask }} Tunnel{{ tunnel_id }} track {{ tunnel_id }}"
      loop: "{{ static_remote_networks }}"
      failed_when: false

    # ---------- Atomic teardown via template ----------
    - name: Push removal template
      cisco.ios.ios_config:
        src: "../templates/remove_IKEV2_route_based_vpn.j2"
        save_when: modified

    - name: Verify — tunnel gone
      cisco.ios.ios_command:
        commands: "show running-config interface Tunnel{{ tunnel_id }}"
      register: tun_after
      failed_when: false

    - name: Result
      ansible.builtin.debug:
        var: tun_after.stdout_lines
